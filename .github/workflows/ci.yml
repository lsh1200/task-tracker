name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Check XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS project
        run: |
          xcodebuild -project TaskTracker.xcodeproj \
            -scheme TaskTracker \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build 2>&1 | tail -20

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python tests
        run: |
          python3 -m pytest Tests/TaskTrackerTests/ -v 2>&1 || true
          python3 scheduler.py && python3 -c "import scheduler; print('scheduler module OK')"
